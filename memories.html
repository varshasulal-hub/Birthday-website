
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Magical Memories ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at center,#1a0510,#000);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* title */

h1{
font-family:'Playfair Display',serif;
font-size:2rem;
color:#ffb6d9;
margin-bottom:20px;
text-shadow:0 0 12px rgba(255,182,193,0.7);
display:none;
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
opacity:0;
}

/* title fade */

.fadeTitle{
animation:fadeTitle 2s forwards;
}

@keyframes fadeTitle{
from{
opacity:0;
transform:translate(-50%,-20px);
}
to{
opacity:1;
transform:translate(-50%,0);
}
}

/* floating hearts */

.heart{
position:absolute;
font-size:22px;
pointer-events:none;
animation:floatUp linear infinite;
z-index:1;
}

@keyframes floatUp{
0%{ transform:translateY(100vh); opacity:0;}
10%{opacity:1;}
100%{ transform:translateY(-20vh); opacity:0;}
}

/* background box */

.textBox{
background:rgba(0,0,0,0.55);
padding:20px 30px;
border-radius:14px;
box-shadow:0 0 12px rgba(255,182,193,0.5);
text-align:center;
}

/* gallery */

.gallery{
display:none;
width:100%;
height:100%;
position:relative;
display:flex;
align-items:center;
justify-content:center;
z-index:2;
padding-top:100px;
}

/* memory card */

.memoryCard{
position:absolute;
width:250px;
height:444px;
border-radius:12px;
overflow:hidden;
background:#000;
box-shadow:0 0 18px rgba(255,105,180,0.6);
opacity:0;
transition:opacity 2s;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.memoryCard.show{
opacity:1;
}

.memoryCard video{
width:100%;
height:100%;
object-fit:cover;
}

/* caption */

.caption{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.6);
color:#ff5fa2;
font-size:1rem;
padding:8px;
text-align:center;
}

/* entrance */

#entranceOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#startMemoriesBtn{
margin-top:20px;
padding:14px 36px;
font-size:1.1rem;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ffd6e8,#ff9ebc);
color:#5a1730;
font-weight:600;
cursor:pointer;
}

/* next */

#continueContainer{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:10;
display:none;
}

#continueBtn{
margin-top:10px;
padding:12px 32px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ffd6e8,#ff9ebc);
color:#5a1730;
font-weight:600;
cursor:pointer;
}

</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="media/Madhupole.mp3" type="audio/mpeg">
</audio>

<!-- Entrance -->

<div id="entranceOverlay">
<div class="textBox">
<h2>✨ Let’s go through our magical memories ✨</h2>
</div>
<button id="startMemoriesBtn">Start Memories ❤️</button>
</div>

<h1 id="title">✨ Our Magical Memories ✨</h1>

<div class="gallery">

<div class="memoryCard">
<video id="memoryVideo" src="media/Vid2.mp4"></video>
<div class="caption">Unforgettable 💗</div>
</div>

</div>

<div id="continueContainer" class="textBox">
<button id="continueBtn" onclick="goNext()">Next Surprise ▶</button>
</div>

<script>

/* floating hearts */

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
const hearts=["❤️","💖","💕","💘","💗"];
heart.innerText=hearts[Math.floor(Math.random()*hearts.length)];
heart.style.left=Math.random()*90+"vw";
heart.style.fontSize=14+Math.random()*20+"px";
heart.style.animationDuration=4+Math.random()*3+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),5000);
}

setInterval(createHeart,300);

const startBtn=document.getElementById("startMemoriesBtn");
const gallery=document.querySelector(".gallery");
const cards=document.querySelectorAll(".memoryCard");
const music=document.getElementById("bgMusic");
const title=document.getElementById("title");
const video=document.getElementById("memoryVideo");

startBtn.onclick=function(){

document.getElementById("entranceOverlay").style.display="none";

/* show title slowly */

title.style.display="block";
title.classList.add("fadeTitle");

/* show gallery */

gallery.style.display="flex";

/* fade video card */

cards[0].style.display="flex";
setTimeout(()=>{
cards[0].classList.add("show");
},100);

/* start music + video together */

music.volume=0.5;
music.play();
video.play();

/* when video ends */

video.onended=function(){
document.getElementById("continueContainer").style.display="block";
};

};

function goNext(){
window.location.href="quiz.html";
}

</script>

</body>
</html>
